<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Justra</title>
    <meta
      name="description"
      content="Justra is a trustless escrow for software delivery. Funds lock in a Solana smart contract, AI verifies the work, and humans arbitrate edge cases."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Justra — Trustless software delivery escrow" />
    <meta
      property="og:description"
      content="Funds lock in a Solana smart contract, AI verifies the work against agreed milestones, and humans arbitrate the rare edge cases — so clients pay with confidence and developers get paid on time."
    />
    <meta property="og:url" content="https://justra.io" />
    <meta property="og:image" content="https://justra.io/og-image.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      try {
        var p = JSON.parse(localStorage.getItem("justra_prefs") || "{}");
        if (p.theme) document.documentElement.setAttribute("data-theme", p.theme);
        if (p.density) document.documentElement.setAttribute("data-density", p.density);
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
